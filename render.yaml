services:
  - type: web
    name: vedastro-gateway
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn gateway.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOW_ORIGINS
        value: https://vedastro-dev.vercel.app
      - key: FRONTEND_BASE_URL
        value: https://vedastro-dev.vercel.app
      - key: SECRET_KEY
        sync: false
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@gmail.com
      - key: DEFAULT_ADMIN_PASSWORD
        value: admin123
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: omjig017@gmail.com
      - key: SMTP_PASSWORD
        value: nizcjkhdgfnuqogs
      - key: SMTP_USE_TLS
        value: "true"
      - key: USE_REDIS_RATE_LIMIT
        value: "false"

