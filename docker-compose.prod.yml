services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.prod
    volumes:
      - uploads_data:/app/storage/uploads
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./fastapi-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vedastro
      POSTGRES_USER: vedastro
      POSTGRES_PASSWORD: vedastro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - api
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./deploy.nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  uploads_data:
