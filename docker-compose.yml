services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.dev
    environment:
      DATABASE_URL: postgresql+psycopg://vedastro:vedastro@db:5432/vedastro
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./fastapi-frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./fastapi-frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    ports:
      - "5173:5173"

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vedastro
      POSTGRES_USER: vedastro
      POSTGRES_PASSWORD: vedastro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  frontend_node_modules:
